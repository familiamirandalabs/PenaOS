# ============================================================================
#  99-penaos-lowmem.conf — ajustes do kernel pra rodar bem com POUCA RAM
# ----------------------------------------------------------------------------
#  Como o swap aqui e zram (RAM comprimida, rapidissimo), a gente INCENTIVA
#  o kernel a usar swap cedo, em vez de esperar a memoria acabar e matar
#  processos. Isso mantem o navegador vivo numa maquina de 500MB.
# ============================================================================

# manda o kernel jogar pro zram agressivamente (swap aqui e barato)
vm.swappiness = 100

# segura menos cache de inode/dentry quando a memoria aperta
vm.vfs_cache_pressure = 200

# le 1 pagina por vez do swap (otimo pra zram, que ja e RAM)
vm.page-cluster = 0
