# ============================================================================
#  zram-generator.conf — swap COMPRIMIDO na RAM (o maior ganho numa POTATO)
# ----------------------------------------------------------------------------
#  Numa maquina de 500MB, o sistema sufoca: navegador + Tk + X comem tudo e
#  comeca o "Oops" (processos morrendo por falta de memoria).
#  O zram cria uma area de swap DENTRO da propria RAM, mas comprimida com zstd
#  (~3x). Na pratica e como ganhar memoria de graça: 500MB viram ~1GB uteis,
#  sem disco, sem latencia de HD. Sem isto o navegador trava em pouca RAM.
# ============================================================================

[zram0]
# usa o dobro da RAM como swap comprimido (limite de 2GB pra nao exagerar)
zram-size = min(ram * 2, 2048)
compression-algorithm = zstd
swap-priority = 100
fs-type = swap
